<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navegação Vertical</title>
    <style>
      /* ================= RESET / CONFIG GLOBAIS ================= */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .sidebar {
        width: 220px;
      }

      .sidebar ul {
        padding: 20px;
      }

      .sidebar li {
        list-style: none;
      }

      .sidebar a {
        display: block;
        padding: 12px 16px;
        text-decoration: none;
        background: #ffff5c;
        color: #000;
        transition:
          background 0.2s,
          color 0.2s;
      }

      .sidebar a:hover {
        background: orange;
        color: white;
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Sobre</a></li>
        <li><a href="#">Serviços</a></li>
        <li><a href="#">Notícias</a></li>
        <li><a href="#">Contato</a></li>
      </ul>
    </nav>
  </body>
</html>
