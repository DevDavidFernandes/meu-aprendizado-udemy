<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: grid;
        grid-template-columns: 260px 1fr;
        height: 100vh;
        overflow: hidden;
      }

      .sidebar {
        border-right: 1px solid #ddd;
      }

      .sidebar ul {
        list-style: none;
      }

      .sidebar a {
        display: flex;
        align-items: center;
        padding: 12px 20px;
        text-decoration: none;
        color: black;
      }

      .sidebar a:hover {
        background: #e5e5e5;
      }

      .sidebar a.active {
        background: #2c3e50;
        color: white;
      }

      .content {
        padding: 20px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <nav>
        <ul>
          <li><a class="active" href="#">Dashboard</a></li>
          <li><a href="#">Usuários</a></li>
          <li><a href="#">Relatórios</a></li>
        </ul>
      </nav>
    </aside>
  </body>
</html>
